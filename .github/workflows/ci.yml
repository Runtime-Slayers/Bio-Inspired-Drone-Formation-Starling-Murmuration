name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: "Test · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check drone_swarm/ hrv_analysis/ experiments/ tests/ \
            --output-format=github \
            --select E,W,F,I,N,UP

      - name: Run pytest
        run: |
          pytest tests/ \
            --strict-markers \
            --strict-config \
            -p no:warnings \
            -v \
            --tb=short \
            --cov=drone_swarm \
            --cov=hrv_analysis \
            --cov-report=html:htmlcov \
            --cov-fail-under=75
        env:
          MPLBACKEND: Agg

      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-py${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 14

  doctest:
    name: "Doctest · Packages"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run doctests
        run: |
          pytest --doctest-modules drone_swarm/ hrv_analysis/ \
            -v \
            --tb=short \
            -p no:warnings
        env:
          MPLBACKEND: Agg

  smoke:
    name: "Smoke tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Swarm Drone Experiment
        run: |
          python experiments/bt19_swarm_drones.py --no-plots --output-dir /tmp/smoke_out
        env:
          MPLBACKEND: Agg

      - name: Run HRV MFDFA Experiment
        run: |
          python experiments/p39_real_data.py --no-plots --output-dir /tmp/smoke_out
        env:
          MPLBACKEND: Agg

      - name: Validate JSON Outputs
        run: |
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          
          # Swarm Check
          swarm_p = Path("/tmp/smoke_out/bt19_swarm_drones_results.json")
          assert swarm_p.exists()
          swarm_data = json.loads(swarm_p.read_text())
          assert "comparison" in swarm_data
          assert "fault_tolerance" in swarm_data
          
          # HRV Check
          hrv_p = Path("/tmp/smoke_out/p39_fractal_stress_results.json")
          assert hrv_p.exists()
          hrv_data = json.loads(hrv_p.read_text())
          assert "dfa_alpha" in hrv_data
          assert "delta_h_mfdfa" in hrv_data
          
          print("All JSON outputs validated successfully ✓")
          PYEOF

  security:
    name: "Security audit · pip-audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pip-audit
      - name: Run pip-audit
        run: |
          pip-audit --format=json --output=audit.json || true
          python - <<'PYEOF'
          import json, sys
          from pathlib import Path
          raw = Path("audit.json").read_text()
          report = json.loads(raw)
          vulns = [v for pkg in report for v in pkg.get("vulns", [])]
          if vulns:
              print(f"Warnings: {len(vulns)} advisories found.")
          else:
              print("No CVEs found ✓")
          PYEOF

  docs:
    name: "Integrity check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - name: Verify files
        run: |
          for f in README.md LICENSE CONTRIBUTING.md CHANGELOG.md docs/THEORY.md; do
            if [ ! -s "$f" ]; then
              echo "$f is missing or empty" && exit 1
            fi
          done
          echo "All documentation files validated ✓"

      - name: Verify Version Consistency
        run: |
          pyproject_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('pyproject.toml').read_text()
          m = re.search(r'version\s*=\s*\"([^\"]+)\"', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          init_ver=$(python -c "
          import re, pathlib
          text = pathlib.Path('drone_swarm/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*[\"\\']([^\"\\']+)', text)
          print(m.group(1) if m else 'NOTFOUND')
          ")
          if [ "$pyproject_ver" != "$init_ver" ]; then
            echo "Version mismatch: pyproject ($pyproject_ver) vs package ($init_ver)" && exit 1
          fi
          echo "Versions are consistent ✓"
